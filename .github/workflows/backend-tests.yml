name: Backend Tests

on:
  push:
    branches: [master, main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [master, main]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run tests
        working-directory: ./backend
        run: mvn clean test
      
      - name: Build
        working-directory: ./backend
        run: mvn clean compile -DskipTests
